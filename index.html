<!DOCTYPE html>
<html>
<head>
    <title>My iPad Website</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>สร้างจาก iPad 🍎</h1>
        <p>กำลังหัดเขียนเว็บผ่าน GitHub Pages ครับ</p>
    </div>
</body>
 <button onclick="changeColor()" style="padding: 10px; margin-top: 20px; cursor: pointer;">
    กดเพื่อเปลี่ยนสีพื้นหลัง
</button>

<script>
function changeColor() {
    const colors = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff'];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    document.body.style.backgroundColor = randomColor;
}
</script>
</html>
